:root, [data-theme="light"] {

  --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
  --text-2xl: clamp(2rem, 1.2rem + 2.5vw, 3.5rem);
  --text-3xl: clamp(2.5rem, 1rem + 4vw, 5rem);

  --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
  --space-4: 1rem; --space-5: 1.25rem; --space-6: 1.5rem;
  --space-8: 2rem; --space-10: 2.5rem; --space-12: 3rem;
  --space-16: 4rem; --space-20: 5rem; --space-24: 6rem;

  --color-bg: #f5ede0;
  --color-surface: #faf4eb;
  --color-surface-2: #fffdf8;
  --color-surface-offset: #ede0cc;
  --color-divider: #d4be9a;

  --color-text: #2a1f0e;
  --color-text-muted: #6b5540;
  --color-text-faint: #a88a6a;
  --color-text-inverse: #faf4eb;
  --color-primary: #1a4a7a;
  --color-primary-hover: #133a62;
  --color-primary-active: #0d2a4a;
  --color-primary-highlight: #c8d8ec;
  --color-accent: #b8860b;
  --color-accent-light: #f0d080;
  --color-accent-bg: #fdf3cc;

  --radius-sm: 0.375rem; --radius-md: 0.5rem;
  --radius-lg: 0.75rem; --radius-xl: 1rem; --radius-full: 9999px;
  --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);
  --shadow-sm: 0 1px 2px oklch(0.2 0.04 60 / 0.08);
  --shadow-md: 0 4px 12px oklch(0.2 0.04 60 / 0.12);
  --shadow-lg: 0 12px 32px oklch(0.2 0.04 60 / 0.18);
  --content-default: 960px;
  --font-display: 'Noto Serif TC', 'Georgia', serif;
  --font-body: 'Noto Sans TC', 'Helvetica Neue', sans-serif;
}

[data-theme="dark"] {

  --color-surface: #211910;
  --color-surface-2: #281f14;
  --color-surface-offset: #1e1509;
  --color-divider: #3a2d1e;
  --color-border: #4a3822;
  --color-text: #e8d8c0;
  --color-text-muted: #a08060;
  --color-text-faint: #6a5040;
  --color-text-inverse: #1a1208;
  --color-primary: #6a9fd4;
  --color-primary-hover: #5088bb;
  --color-primary-active: #3870a0;
  --color-primary-highlight: #1a2d44;
  --color-accent: #d4a020;
  --color-accent-light: #8a6010;
  --color-accent-bg: #2a1f08;
  --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.3);
  --shadow-md: 0 4px 12px oklch(0 0 0 / 0.4);
  --shadow-lg: 0 12px 32px oklch(0 0 0 / 0.5);
}

@media (prefers-color-scheme: dark) {
  :root:not([data-theme]) {
    --color-bg: #1a1208; --color-surface: #211910; --color-surface-2: #281f14;

  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; scroll-padding-top: 80px; }
body {
  min-height: 100dvh; line-height: 1.7;

}
img { display: block; max-width: 100%; height: auto; }
ul[role="list"], ol[role="list"] { list-style: none; }
h1,h2,h3,h4 { text-wrap: balance; line-height: 1.2; font-family: var(--font-display); }
p,li { text-wrap: pretty; }

/* Skip link */
.skip-link { position: absolute; top: -100px; left: var(--space-4); background: var(--color-primary); color: var(--color-text-inverse); padding: var(--space-2) var(--space-4); border-radius: var(--radius-md); font-size: var(--text-sm); z-index: 999; }
.skip-link:focus { top: var(--space-4); }

/* Header */
header {
  position: sticky; top: 0; z-index: 100;

  box-shadow: var(--shadow-sm);
}
.header-inner {
  max-width: var(--content-default); margin: 0 auto;
  padding: var(--space-3) var(--space-6);

}
.site-logo { display: flex; align-items: center; gap: var(--space-3); text-decoration: none; }
.site-logo svg { flex-shrink: 0; }
.site-logo-text { font-family: var(--font-display); font-size: var(--text-sm); font-weight: 700; color: var(--color-text); }
.site-logo-sub { font-size: var(--text-xs); color: var(--color-text-muted); display: block; }

.header-right { display: flex; align-items: center; gap: var(--space-3); }
button[data-theme-toggle] {

  cursor: pointer; transition: all var(--transition-interactive);
}
button[data-theme-toggle]:hover { color: var(--color-text); background: var(--color-surface-offset); }

.hero {

.hero-content { position: relative; max-width: 700px; margin: 0 auto; }
.hero-badge {

}
.hero-subtitle { font-size: var(--text-lg); color: #c8b89a; margin-bottom: var(--space-8); line-height: 1.6; }
.hero-divider {

  background: linear-gradient(90deg, transparent, #c8a030, transparent);

.topic-nav {

}
.topic-nav a {
  background: oklch(0.7 0.15 80 / 0.12); border: 1px solid oklch(0.7 0.15 80 / 0.3);
  color: #e8d090; text-decoration: none; padding: var(--space-2) var(--space-4);

  transition: all var(--transition-interactive);
}
.topic-nav a:hover { background: oklch(0.7 0.15 80 / 0.25); color: #fff; }

/* Main content */
main { max-width: var(--content-default); margin: 0 auto; padding: var(--space-12) var(--space-6); }

/* Topic sections */
.topic-section {
  margin-bottom: var(--space-16);
  border-radius: var(--radius-xl);
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  overflow: hidden;
  box-shadow: var(--shadow-md);
}
.topic-header {

  border-bottom: 1px solid var(--color-border);
  display: flex; align-items: center; gap: var(--space-4);
}
